<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Interactive VTT with Resources & Dungeons</title>
<style>
html,body{margin:0;overflow:hidden;background:#1e1e1e;color:#eee;font-family:sans-serif;touch-action:none}
canvas{display:block}
#ui,#initiative,#popup{position:fixed;background:rgba(0,0,0,.85);padding:8px;border-radius:6px;z-index:10;font-size:14px;}
#ui{left:8px;width:180px;top:8px}
#initiative{right:8px;width:160px;top:8px}
#popup{display:none;z-index:20}
button,select,input{width:100%;margin-top:4px}
.tokenTurn{padding:4px;margin-top:2px;background:#333;border-radius:4px;cursor:pointer}
.active{background:#aa3333}
</style>
</head>
<body>

<div id="ui">
<select id="mode">
 <option value="pan">Pan</option>
 <option value="token">Place Token</option>
 <option value="resource">Place Resource</option>
</select>

<select id="resourceType">
 <option value="dungeon">Dungeon</option>
 <option value="chest">Chest</option>
 <option value="stoneMine">Stone Mine</option>
 <option value="goldMine">Gold Mine</option>
</select>

<select id="fogView">
 <option value="dm">DM View</option>
 <option value="player">Player View</option>
</select>

<button id="save">Save</button>
<input type="file" id="load">
</div>

<div id="initiative">
<b>Initiative</b>
<div id="order"></div>
<button id="next">Next Turn</button>
</div>

<div id="popup"></div>
<canvas id="c"></canvas>

<script src="monsters.js"></script>
<script src="inventory.js"></script>
<script src="main.js"></script>
<script>
/* ================= SETUP ================= */
const c=document.getElementById('c'), ctx=c.getContext('2d');
let w=c.width=innerWidth, h=c.height=innerHeight;
onresize=()=>{w=c.width=innerWidth; h=c.height=innerHeight; draw();};

const grid=50;
let offX=0, offY=0, dragging=false, dragStart=null, dragToken=null;
const tiles={}, tokens=[], initiative=[], resources=[];
let turn=0;
const fog={};

const biomeColor={grass:'#4b6f44',forest:'#2f4f2f',desert:'#c2b280',snow:'#e6f2ff',water:'#2a6bd6'};
const resourceColor={dungeon:'#800080',chest:'#ffd700',stoneMine:'#888',goldMine:'#ffd700'};
const CHUNK=8, seed=999;

/* ================= HELPERS ================= */
const key=(x,y)=>`${x},${y}`;
const screenToWorld=(x,y)=>[Math.floor((x-offX)/grid), Math.floor((y-offY)/grid)];
function rand(x,y){let n=x*374761393+y*668265263^seed;n=(n^(n>>13))*1274126177;return ((n^(n>>16))>>>0)/4294967295;}

/* ================= BIOMES ================= */
function tileAt(x,y){
 if(tiles[key(x,y)]) return tiles[key(x,y)];
 const r=rand(x,y); let t='grass';
 if(r<.07)t='water'; else if(r<.2)t='desert'; else if(r<.55)t='grass'; else if(r<.8)t='forest'; else t='snow';
 tiles[key(x,y)]=t;
 return t;
}

/* ================= FOG ================= */
function reveal(token){
 const r=token.vision||3;
 fog[token.id]=fog[token.id]||{};
 for(let dx=-r;dx<=r;dx++)
 for(let dy=-r;dy<=r;dy++){
  if(dx*dx+dy*dy>r*r)continue;
  fog[token.id][key(token.x+dx,token.y+dy)]=false;
 }
}

function drawFog(){
 if(document.getElementById('fogView').value==='dm')return;
 ctx.fillStyle='rgba(0,0,0,.85)';
 const cols=Math.ceil(w/grid)+2,rows=Math.ceil(h/grid)+2;
 const sx=Math.floor(-offX/grid)-1,sy=Math.floor(-offY/grid)-1;
 for(let x=sx;x<sx+cols;x++)
 for(let y=sy;y<sy+rows;y++){
  let visible=false;
  for(const t of tokens) if(fog[t.id] && fog[t.id][key(x,y)]===false) visible=true;
  if(!visible) ctx.fillRect(x*grid+offX,y*grid+offY,grid,grid);
 }
}

/* ================= INPUT ================= */
const pointer=e=>{const t=e.touches?e.touches[0]:e;return [t.clientX,t.clientY];};

c.onpointerdown=e=>{
 const [px,py]=pointer(e), [wx,wy]=screenToWorld(px,py);
 popup.style.display='none';

 // Check token click
 for(const t of tokens) if(t.x===wx && t.y===wy){ dragToken=t; showTokenPopup(px,py,t); return; }
 // Check resource click
 for(const r of resources) if(r.x===wx && r.y===wy){ showResourcePopup(px,py,r,tokens[turn]); return; }

 const mode=document.getElementById('mode').value;
 if(mode==='pan'){ dragging=true; dragStart=[px,py]; return; }

 if(mode==='token'){
  if(tileAt(wx,wy)==='water')return;
  const t={id:crypto.randomUUID(),x:wx,y:wy,name:'PC',vision:3,hp:10,inventory:[]};
  tokens.push(t); initiative.push(t); reveal(t); updateInitiative(); draw();
 }

 if(mode==='resource'){
  const type=document.getElementById('resourceType').value;
  const r={x:wx,y:wy,type, loot:[], monsters:[], generated:false};
  resources.push(r); draw();
 }
};

c.onpointermove=e=>{
 const [px,py]=pointer(e);
 if(dragging){ offX+=px-dragStart[0]; offY+=py-dragStart[1]; dragStart=[px,py]; draw(); }
 if(dragToken){ const [wx,wy]=screenToWorld(px,py); dragToken.x=wx; dragToken.y=wy; reveal(dragToken); draw(); }
};
c.onpointerup=()=>{dragging=false; dragToken=null};

/* ================= DRAW ================= */
function draw(){
 ctx.clearRect(0,0,w,h);
 const cols=Math.ceil(w/grid)+2, rows=Math.ceil(h/grid)+2;
 const sx=Math.floor(-offX/grid)-1, sy=Math.floor(-offY/grid)-1;

 for(let x=sx;x<sx+cols;x++)
 for(let y=sy;y<sy+rows;y++){ ctx.fillStyle=biomeColor[tileAt(x,y)]; ctx.fillRect(x*grid+offX,y*grid+offY,grid,grid); }

 for(const r of resources){
  ctx.fillStyle=resourceColor[r.type];
  ctx.beginPath();
  ctx.arc(r.x*grid+offX+grid/2,r.y*grid+offY+grid/2,grid/3,0,Math.PI*2);
  ctx.fill();
 }

 for(const t of tokens){
  ctx.fillStyle='#f44';
  ctx.beginPath();
  ctx.arc(t.x*grid+offX+grid/2,t.y*grid+offY+grid/2,grid/3,0,Math.PI*2);
  ctx.fill();
 }

 ctx.strokeStyle='#555';
 for(let x=offX%grid;x<w;x+=grid){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke(); }
 for(let y=offY%grid;y<h;y+=grid){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke(); }

 drawFog();
}

/* ================= INITIATIVE ================= */
const orderDiv=document.getElementById('order');
let dragIdx=null;
function updateInitiative(){
 orderDiv.innerHTML='';
 initiative.forEach((t,i)=>{
  const d=document.createElement('div');
  d.className='tokenTurn'+(i===turn?' active':'');
  d.textContent=t.name; d.draggable=true;
  d.ondragstart=()=>dragIdx=i;
  d.ondragover=e=>e.preventDefault();
  d.ondrop=()=>{initiative.splice(i,0,initiative.splice(dragIdx,1)[0]); updateInitiative();}
  orderDiv.appendChild(d);
 });
}
document.getElementById('next').onclick=()=>{turn=(turn+1)%initiative.length; updateInitiative();};

/* ================= RESOURCE INTERACTIONS ================= */
const dungeonLootPool=['Gold','Potion','Magic Scroll','Gem','Weapon'];
const dungeonMonstersPool=['Goblin','Orc','Skeleton','Slime','Troll'];

function generateDungeonContents(){
 const lootCount=2+Math.floor(Math.random()*3);
 const monsterCount=1+Math.floor(Math.random()*3);
 const loot=[], monsters=[];
 for(let i=0;i<lootCount;i++) loot.push(dungeonLootPool[Math.floor(Math.random()*dungeonLootPool.length)]);
 for(let i=0;i<monsterCount;i++) monsters.push(dungeonMonstersPool[Math.floor(Math.random()*dungeonMonstersPool.length)]);
 return {loot, monsters};
}

function showResourcePopup(x,y,r, token){
 popup.style.left=x+'px';
 popup.style.top=y+'px';
 popup.style.display='block';

 if(r.type==='dungeon' && !r.generated){
  const contents=generateDungeonContents();
  r.loot=contents.loot; r.monsters=contents.monsters; r.generated=true;
 }

 let html=`<b>${r.type}</b><br>X:${r.x} Y:${r.y}<br>`;
 if(r.type!=='dungeon'){
  html+=`Loot: ${r.loot.join(', ')}<br><button id="collect">Collect</button>`;
 } else {
  html+=`Monsters: ${r.monsters.join(', ')}<br>`;
  html+=`Loot: ${r.loot.join(', ')}<br>`;
  html+=`<button id="enterDungeon">Enter Dungeon</button>`;
 }
 html+=`<button id="close">Close</button>`;
 popup.innerHTML=html;

 document.getElementById('collect')?.addEventListener('click',()=>{
  token.inventory.push(...r.loot);
  alert(`${token.name} collected: ${r.loot.join(', ')}`);
  r.loot=[]; draw(); popup.style.display='none';
 });

 document.getElementById('enterDungeon')?.addEventListener('click',()=>{
  token.inventory.push(...r.loot);
  alert(`${token.name} battles: ${r.monsters.join(', ')} and finds loot: ${r.loot.join(', ')}`);
  r.loot=[]; r.monsters=[]; draw(); popup.style.display='none';
 });

 document.getElementById('close').onclick=()=>{popup.style.display='none';};
}

/* ================= TOKEN POPUP & RENAME ================= */
function showTokenPopup(x,y, token){
 popup.style.left=x+'px'; popup.style.top=y+'px'; popup.style.display='block';
 popup.innerHTML=`
 <b>Token: ${token.name}</b><br>
 Name: <input id="rename" value="${token.name}"><br>
 HP: <input type="number" id="hp" value="${token.hp}"><br>
 Vision: <input type="number" id="vision" value="${token.vision}"><br>
 <button id="ok">OK</button>
 <button id="closeToken">Close</button>
 `;
 document.getElementById('ok').onclick=()=>{
  token.name=document.getElementById('rename').value;
  token.hp=parseInt(document.getElementById('hp').value);
  token.vision=parseInt(document.getElementById('vision').value);
  updateInitiative(); draw(); popup.style.display='none';
 };
 document.getElementById('closeToken').onclick=()=>{popup.style.display='none';};
}

/* ================= INVENTORY ================= */
function showInventory(token){
 popup.style.display='block'; popup.style.left='50px'; popup.style.top='50px';
 popup.innerHTML=`<b>${token.name} Inventory</b><br>${token.inventory.join(', ') || 'Empty'}<br><button id="closeInv">Close</button>`;
 document.getElementById('closeInv').onclick=()=>{popup.style.display='none';};
}
window.addEventListener('keydown',e=>{
 if(e.key==='i' && tokens.length>0){
  const token=tokens[turn];
  showInventory(token);
 }
});

/* ================= SAVE / LOAD ================= */
document.getElementById('save').onclick=()=>{
 const data={tiles,tokens,initiative,resources,offX,offY,fog};
 const a=document.createElement('a');
 a.href=URL.createObjectURL(new Blob([JSON.stringify(data)],{type:'application/json'}));
 a.download='map.json';a.click();
};
document.getElementById('load').onchange=e=>{
 const r=new FileReader();
 r.onload=()=>{
  const d=JSON.parse(r.result);
  Object.assign(tiles,d.tiles);
  tokens.splice(0,tokens.length,...d.tokens);
  initiative.splice(0,initiative.length,...d.initiative);
  resources.splice(0,resources.length,...d.resources);
  offX=d.offX; offY=d.offY;
  Object.assign(fog,d.fog);
  updateInitiative(); draw();
 };
 r.readAsText(e.target.files[0]);
};
/* ===== Multi-Room Dungeon Exploration ===== */
const dungeonLevels = {}; // dungeonId -> array of rooms

function generateDungeon(id, roomsCount=3){
  if(dungeonLevels[id]) return dungeonLevels[id];
  const rooms = [];
  for(let i=0;i<roomsCount;i++){
    const monsters=[], loot=[];
    const monsterCount = 1 + Math.floor(Math.random()*3);
    const lootCount = 1 + Math.floor(Math.random()*3);
    for(let j=0;j<monsterCount;j++){
      monsters.push({...monsterPool[Math.floor(Math.random()*monsterPool.length)]});
    }
    for(let j=0;j<lootCount;j++){
      loot.push(lootPool[Math.floor(Math.random()*lootPool.length)]);
    }
    rooms.push({monsters, loot, cleared:false});
  }
  dungeonLevels[id] = rooms;
  return rooms;
}

function enterDungeon(token, dungeonId){
  const rooms = generateDungeon(dungeonId);
  let currentRoom = 0;

  function visitRoom(){
    if(currentRoom >= rooms.length){
      alert(`${token.name} cleared the dungeon!`);
      return;
    }
    const room = rooms[currentRoom];
    if(room.cleared){ currentRoom++; visitRoom(); return; }

    // Popup for room
    popup.style.display='block';
    popup.style.left='100px';
    popup.style.top='100px';
    popup.innerHTML = `
      <b>Dungeon Room ${currentRoom+1}</b><br>
      Monsters: ${room.monsters.map(m=>m.name+'(HP:'+m.hp+')').join(', ') || 'None'}<br>
      Loot: ${room.loot.join(', ') || 'None'}<br>
      <button id="fightRoom">Fight</button>
      <button id="skipRoom">Skip</button>
    `;

    document.getElementById('fightRoom').onclick = () => {
      // Simple combat
      room.monsters.forEach(m=>{
        while(m.hp>0 && token.hp>0){
          m.hp -= 2; // fixed attack
          if(m.hp <=0) break;
          token.hp -= m.atk;
        }
      });
      if(token.hp>0){
        token.inventory.push(...room.loot);
        alert(`${token.name} cleared the room and collected: ${room.loot.join(', ')}`);
      } else {
        alert(`${token.name} was defeated in the room!`);
      }
      room.cleared = true;
      currentRoom++;
      popup.style.display='none';
      visitRoom();
    };

    document.getElementById('skipRoom').onclick = () => {
      currentRoom++;
      popup.style.display='none';
      visitRoom();
    };
  }

  visitRoom();
}

/* ===== Hook Into Resource Click ===== */
function onResourceClick(token, resource){
  if(resource.type==='dungeon'){
    const dungeonId = `${resource.x},${resource.y}`;
    if(!dungeonLevels[dungeonId]) generateDungeon(dungeonId, 3);
    enterDungeon(token, dungeonId);
  } else {
    token.inventory.push(...resource.loot);
    alert(`${token.name} collected: ${resource.loot.join(', ')}`);
    resource.loot=[];
    draw();
  }
}

/* ===== Visual Dungeon Rooms on Canvas ===== */
function drawDungeonRoom(token, dungeonId, roomIndex){
  const rooms = dungeonLevels[dungeonId];
  if(!rooms || roomIndex >= rooms.length) return;

  const room = rooms[roomIndex];
  const roomSize = 4; // 4x4 grid
  const roomGrid = 50;
  const offsetX = 100; // arbitrary position on canvas
  const offsetY = 100;

  // Draw room floor
  ctx.fillStyle = '#222';
  ctx.fillRect(offsetX, offsetY, roomSize*roomGrid, roomSize*roomGrid);

  // Draw monsters
  room.monsters.forEach((m,i)=>{
    ctx.fillStyle = '#f00';
    ctx.fillRect(offsetX + (i%roomSize)*roomGrid + 5,
                 offsetY + Math.floor(i/roomSize)*roomGrid + 5,
                 roomGrid-10, roomGrid-10);
  });

  // Draw loot
  room.loot.forEach((l,i)=>{
    ctx.fillStyle = '#ff0';
    ctx.beginPath();
    ctx.arc(offsetX + (i%roomSize)*roomGrid + roomGrid/2,
            offsetY + Math.floor(i/roomSize)*roomGrid + roomGrid/2,
            roomGrid/6,0,Math.PI*2);
    ctx.fill();
  });

  // Draw token
  ctx.fillStyle = '#4af';
  ctx.beginPath();
  ctx.arc(offsetX + roomGrid/2, offsetY + roomGrid/2, roomGrid/3,0,Math.PI*2);
  ctx.fill();
}

/* ===== Hook Into enterDungeon ===== */
function enterDungeon(token, dungeonId){
  const rooms = generateDungeon(dungeonId);
  let currentRoom = 0;

  function visitRoom(){
    if(currentRoom >= rooms.length){
      alert(`${token.name} cleared the dungeon!`);
      draw(); // redraw main map
      return;
    }
    const room = rooms[currentRoom];
    if(room.cleared){ currentRoom++; visitRoom(); return; }

    draw(); // redraw main map
    drawDungeonRoom(token, dungeonId, currentRoom);

    popup.style.display='block';
    popup.style.left='100px';
    popup.style.top='100px';
    popup.innerHTML = `
      <b>Dungeon Room ${currentRoom+1}</b><br>
      Monsters: ${room.monsters.map(m=>m.name+'(HP:'+m.hp+')').join(', ') || 'None'}<br>
      Loot: ${room.loot.join(', ') || 'None'}<br>
      <button id="fightRoom">Fight</button>
      <button id="nextRoom">Skip</button>
    `;

    document.getElementById('fightRoom').onclick = () => {
      room.monsters.forEach(m=>{
        while(m.hp>0 && token.hp>0){
          m.hp -= 2;
          if(m.hp<=0) break;
          token.hp -= m.atk;
        }
      });
      if(token.hp>0){
        token.inventory.push(...room.loot);
        alert(`${token.name} cleared the room and collected: ${room.loot.join(', ')}`);
      } else {
        alert(`${token.name} was defeated in the room!`);
      }
      room.cleared = true;
      currentRoom++;
      popup.style.display='none';
      visitRoom();
    };

    document.getElementById('nextRoom').onclick = () => {
      currentRoom++;
      popup.style.display='none';
      visitRoom();
    };
  }

  visitRoom();
}

/* ===== Dungeon Token Movement ===== */
let activeDungeon = null; // {dungeonId, token, roomIndex}
const dungeonRoomSize = 4;
const dungeonGrid = 50;
let dungeonTokenPos = {x:0, y:0};

function drawDungeon(token, dungeonId, roomIndex){
  const rooms = dungeonLevels[dungeonId];
  if(!rooms || roomIndex >= rooms.length) return;
  const room = rooms[roomIndex];

  const offsetX = 100;
  const offsetY = 100;

  // Draw room floor
  ctx.fillStyle = '#222';
  ctx.fillRect(offsetX, offsetY, dungeonRoomSize*dungeonGrid, dungeonRoomSize*dungeonGrid);

  // Draw monsters
  room.monsters.forEach((m,i)=>{
    ctx.fillStyle = '#f00';
    ctx.fillRect(offsetX + m.x*dungeonGrid + 5,
                 offsetY + m.y*dungeonGrid + 5,
                 dungeonGrid-10, dungeonGrid-10);
  });

  // Draw loot
  room.loot.forEach((l,i)=>{
    ctx.fillStyle = '#ff0';
    ctx.beginPath();
    ctx.arc(offsetX + l.x*dungeonGrid + dungeonGrid/2,
            offsetY + l.y*dungeonGrid + dungeonGrid/2,
            dungeonGrid/6,0,Math.PI*2);
    ctx.fill();
  });

  // Draw token
  ctx.fillStyle = '#4af';
  ctx.beginPath();
  ctx.arc(offsetX + dungeonTokenPos.x*dungeonGrid + dungeonGrid/2,
          offsetY + dungeonTokenPos.y*dungeonGrid + dungeonGrid/2,
          dungeonGrid/3,0,Math.PI*2);
  ctx.fill();

  // Draw grid lines
  ctx.strokeStyle = '#555';
  for(let i=0;i<=dungeonRoomSize;i++){
    ctx.beginPath();
    ctx.moveTo(offsetX+i*dungeonGrid, offsetY);
    ctx.lineTo(offsetX+i*dungeonGrid, offsetY + dungeonRoomSize*dungeonGrid);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(offsetX, offsetY+i*dungeonGrid);
    ctx.lineTo(offsetX + dungeonRoomSize*dungeonGrid, offsetY+i*dungeonGrid);
    ctx.stroke();
  }
}
/* ===== Enter Dungeon with Movement ===== */
function enterDungeonWithMovement(token, dungeonId){
  const rooms = generateDungeon(dungeonId);
  let roomIndex = 0;

  function visitRoom(){
    if(roomIndex >= rooms.length){
      alert(`${token.name} cleared the dungeon!`);
      activeDungeon = null;
      draw(); // redraw main map
      return;
    }
    const room = rooms[roomIndex];
    if(room.cleared){ roomIndex++; visitRoom(); return; }

    // Initialize token in top-left
    dungeonTokenPos = {x:0, y:0};
    activeDungeon = {token, dungeonId, roomIndex};
    draw(); drawDungeon(token, dungeonId, roomIndex);
    alert(`Entering Dungeon Room ${roomIndex+1}`);
  }

  visitRoom();
}

/* ===== Dungeon Controls ===== */
window.addEventListener('keydown', e=>{
  if(!activeDungeon) return;
  const {token,dungeonId,roomIndex} = activeDungeon;
  const room = dungeonLevels[dungeonId][roomIndex];
  const dx = {ArrowLeft:-1, ArrowRight:1, ArrowUp:0, ArrowDown:0}[e.key] || 0;
  const dy = {ArrowLeft:0, ArrowRight:0, ArrowUp:-1, ArrowDown:1}[e.key] || 0;

  if(dx!==0 || dy!==0){
    const nx = dungeonTokenPos.x + dx;
    const ny = dungeonTokenPos.y + dy;
    if(nx>=0 && nx<dungeonRoomSize && ny>=0 && ny<dungeonRoomSize){
      dungeonTokenPos.x = nx;
      dungeonTokenPos.y = ny;
      draw(); drawDungeon(token,dungeonId,roomIndex);

      // Check for monsters at new position
      const mIdx = room.monsters.findIndex(m=>m.x===nx && m.y===ny);
      if(mIdx>=0){
        const monster = room.monsters[mIdx];
        monster.hp -= 2; // simple token attack
        token.hp -= monster.atk;
        alert(`${token.name} hits ${monster.name}! ${monster.name} HP: ${monster.hp}. Token HP: ${token.hp}`);
        if(monster.hp<=0){ room.monsters.splice(mIdx,1); alert(`${monster.name} defeated!`); }
        if(token.hp<=0){ alert(`${token.name} is down!`); activeDungeon=null; draw(); return; }
      }

      // Check for loot at new position
      const lIdx = room.loot.findIndex(l=>l.x===nx && l.y===ny);
      if(lIdx>=0){
        const loot = room.loot[lIdx];
        token.inventory.push(loot.item);
        alert(`${token.name} collects ${loot.item}`);
        room.loot.splice(lIdx,1);
      }

      // Room cleared check
      if(room.monsters.length===0 && room.loot.length===0){
        room.cleared=true;
        alert(`Room cleared!`);
        roomIndex++;
        visitRoom();
      }
    }
  }
});

draw();
</script>
</body>
</html>
